<VirtualHost *:80>

    ServerName DOMAIN_PLACEHOLDER

    DocumentRoot /var/www/Quilo-bot/public


    <Directory /var/www/Quilo-bot/public>

        AllowOverride All
        Require all granted

    </Directory>


    ErrorLog ${APACHE_LOG_DIR}/quilo_error.log
    CustomLog ${APACHE_LOG_DIR}/quilo_access.log combined


</VirtualHost>
